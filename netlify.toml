[build]
publish = "dist"
command = "npm run build:prerender"

[build.environment]
NODE_VERSION = "18"

[[redirects]]
from = "/"
to = "/__kk/index.html"
status = 200
force = true

[redirects.conditions]
query = { lang = "kk" }

[[redirects]]
from = "/calculator/*"
to = "/__kk/calculator/:splat/index.html"
status = 200
force = true

[redirects.conditions]
query = { lang = "kk" }

[[redirects]]
from = "/category/*"
to = "/__kk/category/:splat/index.html"
status = 200
force = true

[redirects.conditions]
query = { lang = "kk" }

[[redirects]]
from = "/legal/*"
to = "/__kk/legal/:splat/index.html"
status = 200
force = true

[redirects.conditions]
query = { lang = "kk" }

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
force = false

[redirects.conditions]
path = [ "!/_*", "!/sitemap.xml", "!/robots.txt", "!/ads.txt", "!/calculator-favicon.svg" ]

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.js"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.css"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.svg"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.png"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.jpg"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.webp"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.avif"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.ico"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.json"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.html"

[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/*.woff2"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.woff"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.ttf"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[functions]
node_bundler = "esbuild"