<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="80" fill="#2563eb" opacity="0.1"/>
  <circle cx="1100" cy="530" r="100" fill="#1e3a8a" opacity="0.1"/>
  <circle cx="1000" cy="150" r="60" fill="#3b82f6" opacity="0.15"/>

  <!-- Calculator icon -->
  <g transform="translate(500, 120)">
    <rect x="0" y="0" width="200" height="260" rx="20" fill="white" opacity="0.95"/>
    <rect x="20" y="20" width="160" height="60" rx="8" fill="#1e40af" opacity="0.2"/>

    <!-- Calculator buttons -->
    <circle cx="50" cy="120" r="15" fill="#3b82f6" opacity="0.3"/>
    <circle cx="100" cy="120" r="15" fill="#3b82f6" opacity="0.3"/>
    <circle cx="150" cy="120" r="15" fill="#3b82f6" opacity="0.3"/>

    <circle cx="50" cy="160" r="15" fill="#3b82f6" opacity="0.3"/>
    <circle cx="100" cy="160" r="15" fill="#3b82f6" opacity="0.3"/>
    <circle cx="150" cy="160" r="15" fill="#3b82f6" opacity="0.3"/>

    <circle cx="50" cy="200" r="15" fill="#3b82f6" opacity="0.3"/>
    <circle cx="100" cy="200" r="15" fill="#3b82f6" opacity="0.3"/>
    <rect x="130" y="185" width="40" height="55" rx="8" fill="#1e40af" opacity="0.4"/>
  </g>

  <!-- Main text -->
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">
    Calk.kz
  </text>

  <text x="600" y="510" font-family="Arial, sans-serif" font-size="36" fill="white" opacity="0.95" text-anchor="middle">
    Калькуляторы для Казахстана
  </text>

  <text x="600" y="560" font-family="Arial, sans-serif" font-size="24" fill="white" opacity="0.8" text-anchor="middle">
    Налоги • Кредиты • Зарплаты • Коммунальные услуги
  </text>
</svg>
